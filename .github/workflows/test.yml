name: Run daily tests

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        node-version: ['20.x', '22.x', '24.x']
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - shell: bash
        env:
          PS_USERNAME: ${{ secrets.PS_USERNAME }}
          PS_PASSWORD: ${{ secrets.PS_PASSWORD }}
        run: |
          npm ci
          npm start

  update-status:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
      - name: Update status
        run: node scripts/update-status.mjs ${{ needs.build.result }}
      - name: Commit
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add status.json README.md
          git commit -m "Update status: ${{ needs.build.result }}" || exit 0
          git pull --rebase
          git push
